<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AegisAI - Pentest Intelligence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0a0a1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header {
            text-align: center; padding: 40px 0 30px;
            border-bottom: 1px solid #2a2a5a;
        }
        header h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }
        header p { color: #888; margin-top: 10px; font-size: 1.1em; }
        .scan-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid #2a2a5a;
            border-radius: 15px;
            padding: 30px;
            margin: 30px auto;
            max-width: 700px;
            backdrop-filter: blur(10px);
        }
        .scan-box h2 { margin-bottom: 20px; color: #00d4ff; }
        .input-group {
            display: flex; gap: 10px; margin-bottom: 15px;
        }
        .input-group input {
            flex: 1; padding: 15px;
            border: 1px solid #3a3a6a;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1em;
        }
        .input-group input::placeholder { color: #666; }
        .input-group button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.2s;
        }
        .input-group button:hover { transform: scale(1.05); }
        .input-group button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        #status {
            margin: 15px 0; padding: 10px; border-radius: 8px;
            display: none;
        }
        #status.scanning {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            display: block;
        }
        #status.done {
            background: rgba(123, 47, 247, 0.1);
            border: 1px solid #7b2ff7;
            display: block;
        }
        #status.error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff4444;
            display: block;
        }
        .results { margin-top: 20px; }
        .vuln-card {
            background: rgba(255,255,255,0.03);
            border-left: 4px solid;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }
        .vuln-card.critical { border-color: #ff0044; }
        .vuln-card.high { border-color: #ff6600; }
        .vuln-card.medium { border-color: #ffcc00; }
        .vuln-card.low, .vuln-card.info { border-color: #00cc88; }
        .vuln-card .severity-badge {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: 0.8em; font-weight: bold; margin-bottom: 8px;
        }
        .severity-badge.critical { background: rgba(255,0,68,0.2); color: #ff4466; }
        .severity-badge.high { background: rgba(255,102,0,0.2); color: #ff8833; }
        .severity-badge.medium { background: rgba(255,204,0,0.2); color: #ffdd44; }
        .severity-badge.low, .severity-badge.info { background: rgba(0,204,136,0.2); color: #44dd99; }
        .vuln-card h3 { margin-bottom: 5px; }
        .vuln-card p { color: #aaa; font-size: 0.9em; margin: 3px 0; }
        .vuln-card .remediation {
            margin-top: 8px; padding: 8px;
            background: rgba(0, 200, 0, 0.1); border-radius: 5px;
            color: #88dd88; font-size: 0.85em;
        }
        .learn-section { margin-top: 30px; }
        .learn-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #3a3a6a;
            padding: 10px 20px; border-radius: 8px; color: #aaa;
            cursor: pointer; margin: 5px; font-size: 0.9em;
        }
        .learn-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000;
        }
        .modal-content {
            background: #1a1a3e; margin: 10% auto; padding: 30px;
            max-width: 600px; border-radius: 15px; border: 1px solid #3a3a6a;
            position: relative;
        }
        .close { position: absolute; top: 10px; right: 20px; font-size: 28px; cursor: pointer; color: #888; }
        .close:hover { color: #fff; }
        footer { text-align: center; padding: 30px; color: #555; margin-top: 50px; border-top: 1px solid #1a1a3e; }
        @media (max-width: 600px) {
            .input-group { flex-direction: column; }
            header h1 { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ AegisAI</h1>
            <p>Assistant Intelligent de Test d'Intrusion</p>
        </header>

        <div class="scan-box">
            <h2>🔍 Nouveau Scan</h2>
            <div class="input-group">
                <input type="text" id="targetInput" placeholder="Entrez une URL ou une IP (ex: example.com)">
                <button id="scanBtn" onclick="startScan()">Lancer le scan</button>
            </div>
            <div id="status"></div>
            <div id="results" class="results"></div>
        </div>

        <div class="scan-box">
            <h2>📚 Apprendre</h2>
            <p style="margin-bottom: 15px; color: #888;">Comprendre les vulnérabilités détectées :</p>
            <button class="learn-btn" onclick="learnVuln('sqli')">SQL Injection</button>
            <button class="learn-btn" onclick="learnVuln('xss')">XSS</button>
            <button class="learn-btn" onclick="learnVuln('directory_listing')">Directory Listing</button>
        </div>

        <footer>
            AegisAI v0.1 — Outil de test d'intrusion éthique. Usage autorisé uniquement sur des systèmes dont vous êtes propriétaire ou avez l'autorisation explicite.
        </footer>
    </div>

    <!-- Modal -->
    <div id="lessonModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="lessonContent"></div>
        </div>
    </div>

    <script>
        async function startScan() {
            const target = document.getElementById('targetInput').value.trim();
            const status = document.getElementById('status');
            const results = document.getElementById('results');
            const btn = document.getElementById('scanBtn');

            if (!target) { alert('Veuillez entrer une cible'); return; }

            btn.disabled = true;
            status.className = 'scanning';
            status.textContent = '🔍 Scan en cours... Analyse des vulnérabilités';
            results.innerHTML = '';
            status.style.display = 'block';

            try {
                const response = await fetch('/api/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ target: target })
                });
                const data = await response.json();

                if (data.error) {
                    status.className = 'error';
                    status.textContent = '❌ ' + data.error;
                    btn.disabled = false;
                    return;
                }

                status.className = 'done';
                status.textContent = `✅ Scan terminé — ${data.vulnerabilities_count} vulnérabilité(s) trouvée(s)`;

                if (data.vulnerabilities.length === 0) {
                    results.innerHTML = '<p style="color: #88dd88; text-align: center; padding: 20px;">✅ Aucune vulnérabilité détectée !</p>';
                } else {
                    let html = '<h3 style="margin: 20px 0 10px;">📋 Résultats :</h3>';
                    data.vulnerabilities.forEach(v => {
                        const sev = v.severity.toLowerCase();
                        html += `
                            <div class="vuln-card ${sev}">
                                <span class="severity-badge ${sev}">${v.severity.toUpperCase()}</span>
                                <h3>${v.name}</h3>
                                <p>${v.description}</p>
                                ${v.payload ? `<p><strong>Payload:</strong> <code style="color:#ff8844;">${v.payload}</code></p>` : ''}
                                ${v.url ? `<p><strong>URL:</strong> <code style="font-size:0.8em;word-break:break-all;">${v.url}</code></p>` : ''}
                                <div class="remediation">🛡️ ${v.remediation}</div>
                            </div>
                        `;
                    });
                    results.innerHTML = html;
                }

                btn.disabled = false;
            } catch (err) {
                status.className = 'error';
                status.textContent = '❌ Erreur : ' + err.message;
                btn.disabled = false;
            }
        }

        async function learnVuln(vulnName) {
            try {
                const response = await fetch('/api/learn/' + vulnName);
                const data = await response.json();
                if (data.error) { alert(data.error); return; }
                
                document.getElementById('lessonContent').innerHTML = `
                    <h2 style="color: #00d4ff; margin-bottom: 15px;">📖 ${data.title}</h2>
                    <p style="margin-bottom: 15px; line-height: 1.6;">${data.description}</p>
                    <h3 style="color: #7b2ff7; margin: 15px 0 5px;">Comment ça marche</h3>
                    <p style="line-height: 1.6;">${data.how_it_works}</p>
                    <h3 style="color: #7b2ff7; margin: 15px 0 5px;">Exemple</h3>
                    <code style="display:block; background: #0a0a1a; padding: 10px; border-radius: 5px; margin: 5px 0; color: #ff8844; word-break: break-all;">${data.example}</code>
                    <h3 style="color: #7b2ff7; margin: 15px 0 5px;">Impact</h3>
                    <p style="line-height: 1.6;">${data.impact}</p>
                    <h3 style="color: #7b2ff7; margin: 15px 0 5px;">Prévention</h3>
                    <div style="background: rgba(0,200,0,0.1); padding: 10px; border-radius: 5px; color: #88dd88;">
                        🛡️ ${data.prevention}
                    </div>
                `;
                document.getElementById('lessonModal').style.display = 'block';
            } catch (err) {
                alert('Erreur: ' + err.message);
            }
        }

        function closeModal() { document.getElementById('lessonModal').style.display = 'none'; }
        window.onclick = function(event) {
            if (event.target == document.getElementById('lessonModal')) closeModal();
        }
    </script>
</body>
      </html>
