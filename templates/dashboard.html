<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AegisAI - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #1a1a3e);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #2a2a5a; }
        header h1 { color: #00d4ff; }
        header a { color: #888; text-decoration: none; padding: 8px 16px; border: 1px solid #2a2a5a; border-radius: 5px; }
        header a:hover { color: #fff; border-color: #00d4ff; }
        .scan-table { margin-top: 30px; }
        .scan-row {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03); border: 1px solid #2a2a5a;
            padding: 15px; margin: 5px 0; border-radius: 8px;
        }
        .scan-row:hover { background: rgba(255,255,255,0.06); }
        .scan-target { color: #00d4ff; font-weight: bold; }
        .scan-status { padding: 3px 10px; border-radius: 20px; font-size: 0.85em; }
        .scan-status.completed { background: rgba(0,200,0,0.15); color: #44dd99; }
        .scan-status.running { background: rgba(0,212,255,0.15); color: #44bbff; }
        .scan-status.pending { background: rgba(255,204,0,0.15); color: #ffdd44; }
        .scan-date { color: #666; font-size: 0.85em; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .stat-card {
            background: rgba(255,255,255,0.03); border: 1px solid #2a2a5a;
            padding: 20px; border-radius: 10px; text-align: center;
        }
        .stat-card .number { font-size: 2em; font-weight: bold; color: #7b2ff7; }
        .stat-card .label { color: #888; margin-top: 5px; }
        footer { text-align: center; padding: 30px; color: #555; margin-top: 50px; border-top: 1px solid #1a1a3e; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Dashboard AegisAI</h1>
            <a href="/">← Nouveau scan</a>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalScans">0</div>
                <div class="label">Scans effectués</div>
            </div>
            <div class="stat-card">
                <div class="number" id="totalVulns">0</div>
                <div class="label">Vulnérabilités trouvées</div>
            </div>
            <div class="stat-card">
                <div class="number" id="criticalCount">0</div>
                <div class="label">Critiques</div>
            </div>
        </div>

        <h2 style="margin: 30px 0 15px;">Historique des scans</h2>
        <div id="scansList" class="scan-table">
            <p style="color: #666;">Chargement...</p>
        </div>

        <footer>AegisAI v0.1</footer>
    </div>

    <script>
        async function loadScans() {
            try {
                const response = await fetch('/api/scans');
                const scans = await response.json();
                
                let totalVulns = 0;
                let critical = 0;
                
                const list = document.getElementById('scansList');
                if (scans.length === 0) {
                    list.innerHTML = '<p style="color: #666;">Aucun scan pour le moment</p>';
                } else {
                    list.innerHTML = '';
                    scans.forEach(s => {
                        const vulns = s.results || [];
                        totalVulns += vulns.length;
                        critical += vulns.filter(v => v.severity === 'critical').length;
                        
                        const date = new Date(s.created_at).toLocaleString('fr-FR');
                        const row = document.createElement('div');
                        row.className = 'scan-row';
                        row.innerHTML = `
                            <div>
                                <div class="scan-target">${s.target}</div>
                                <div class="scan-date">${date}</div>
                            </div>
                            <div>
                                <span class="scan-status ${s.status}">${s.status}</span>
                                <span style="margin-left: 10px; color: #888;">${vulns.length} vuln(s)</span>
                            </div>
                        `;
                        list.appendChild(row);
                    });
                }
                
                document.getElementById('totalScans').textContent = scans.length;
                document.getElementById('totalVulns').textContent = totalVulns;
                document.getElementById('criticalCount').textContent = critical;
            } catch (err) {
                document.getElementById('scansList').innerHTML = '<p style="color: #ff4444;">Erreur de chargement: ' + err.message + '</p>';
            }
        }
        
        loadScans();
    </script>
</body>
                  </html>
